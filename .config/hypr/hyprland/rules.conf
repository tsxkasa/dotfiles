# ######## Window rules #######

windowrule = match:class foot|equibop|org\.quickshell|imv|swappy # They use native transparency or we want them opaque, opaque on
windowrule = match:float 1, match:xwayland 0 # Center all floating windows (not xwayland cause popups), center on

# Float
windowrule = match:class guifetch, float on # FlafyDev/guifetch
windowrule = match:class yad, float on
windowrule = match:class zenity, float on
windowrule = match:class wev, float on
windowrule = match:class org\.gnome\.FileRoller, float on
windowrule = match:class file-roller, float on # WHY IS THERE TWOOOOOOOOOOOOOOOO
windowrule = match:class blueman-manager, float on
windowrule = match:class feh, float on
windowrule = match:class qimgv, float on
windowrule = match:class imv, float on
windowrule = match:class system-config-printer, float on
windowrule = match:class org\.quickshell, float on
windowrule = match:class Free\ Download\ Manager, float on
windowrule = match:class gamescope, float on
windowrule = match:class org.prismlauncher.PrismLauncher, match:title Console window for .+, float on
windowrule = match:title btop, match:class kitty, float on
windowrule = match:class org.fcitx.fcitx5-config-qt, float on

# Float, resize and center
windowrule = match:class foot, match:title nmtui, float on
windowrule = match:class foot, match:title nmtui, size (monitor_w*0.60) (monitor_h*0.70)
windowrule = match:class foot, match:title nmtui, center on
windowrule = match:class org\.gnome\.Settings, float on
windowrule = match:class org\.gnome\.Settings, size (monitor_w*0.70) (monitor_h*0.80)
windowrule = match:class org\.gnome\.Settings, center on
windowrule = match:class org\.pulseaudio\.pavucontrol|yad-icon-browser, float on
windowrule = match:class org\.pulseaudio\.pavucontrol|yad-icon-browser, size (monitor_w*0.60) (monitor_h*0.70)
windowrule = match:class org\.pulseaudio\.pavucontrol|yad-icon-browser, center on
windowrule = match:class nwg-look, float on
windowrule = match:class nwg-look, size (monitor_w*0.50) (monitor_h*0.60)
windowrule = match:class nwg-look, center on
windowrule = match:title terminal filechooser, size (monitor_w*0.50) (monitor_h*0.60)
windowrule = match:class Free\ Download\ Manager, size (monitor_w*0.60) (monitor_h*0.70)
windowrule = match:class org.prismlauncher.PrismLauncher, match:title Console window for .+, size (monitor_w*0.60) (monitor_h*0.70)
windowrule = match:title btop, match:class kitty, size (monitor_w*0.70) (monitor_h*0.80)

# Special workspaces
windowrule = match:class btop, workspace special:sysmon
windowrule = match:class feishin|Spotify|Supersonic|Cider, workspace special:music silent
windowrule = match:initial_title Spotify( Free)? # Spotify wayland, it has no class for some reason, workspace special:music silent
windowrule = match:class discord|equibop|vesktop|whatsapp, workspace special:communication silent
windowrule = match:class Todoist, workspace special:todo silent
windowrule = match:class steam, workspace special:steam silent
windowrule = match:class heroic, workspace special:steam silent

# Dialogs
windowrule = match:title (Select|Open)( a)? (File|Folder)(s)?, float on
windowrule = match:class hyprland-share-picker, float on
windowrule = match:title File (Operation|Upload)( Progress)?, float on
windowrule = match:title .* Properties, float on
windowrule = match:title Export Image as PNG, float on
windowrule = match:title Save As, float on
windowrule = match:title Library, float on
windowrule = match:title (Add|Select)( a)? (File|Folder)(s)?, float on
windowrule = match:title terminal filechooser, float on

# Picture in picture (resize and move done via script)
windowrule = match:title Picture(-| )in(-| )[Pp]icture # Initial move so window doesn't shoot across the screen from the center, move 100%-w-2% 100%-w-3%
windowrule = match:title Picture(-| )in(-| )[Pp]icture, keep_aspect_ratio on
windowrule = match:title Picture(-| )in(-| )[Pp]icture, float on
windowrule = match:title Picture(-| )in(-| )[Pp]icture, pin on

# Steam
windowrule = match:title ^()$,match:class ^(steam)$, stay_focused on
windowrule = match:title ^()$,match:class ^(steam)$, min_size 1 1
windowrule = match:class steam, float on
windowrule = match:title Steam, match:class steam, tile on
windowrule = match:title Steam, match:class steam, rounding 10
windowrule = match:title Friends List, match:class steam, float on
windowrule = match:class steam_app_[0-9]+ # Allow tearing for steam games, immediate on
windowrule = match:class steam_app_[0-9]+ # Always idle inhibit when playing a steam game, idle_inhibit always

# Ugh xwayland popups
windowrule = match:xwayland 1, match:title win[0-9]+, no_dim on
windowrule = match:xwayland 1, match:title win[0-9]+, no_shadow on
windowrule = match:xwayland 1, match:title win[0-9]+, rounding 10

# ######## Workspace rules ########
workspace = w[tv1]s[false], gapsout:$singleWindowGapsOut
workspace = f[1]s[false], gapsout:$singleWindowGapsOut

# ######## Layer rules ########
layerrule = match:namespace hyprpicker, animation fade # Colour picker out animation, animation fade
layerrule = match:namespace logout_dialog, animation fade # wlogout, animation fade
layerrule = match:namespace selection, animation fade # slurp, animation fade
layerrule = match:namespace wayfreeze, animation fade

# Fuzzel
layerrule = match:namespace launcher, animation popin 80%
layerrule = match:namespace launcher, blur on

# Shell
layerrule = match:namespace caelestia-(border-exclusion|area-picker), no_anim on
layerrule = match:namespace caelestia-(drawers|background), animation fade

layerrule = match:namespace caelestia-drawers, blur on
layerrule = match:namespace caelestia-drawers, ignore_alpha 0.57
layerrule = match:namespace gtk4-layer-shell, no_anim on

layerrule = match:namespace ^(dms)$, no_anim on
layerrule = match:namespace caelestia-area-picker, no_anim on
layerrule = match:namespace ^(quickshell)$, no_anim on
layerrule = match:namespace dms:workspace-overview, no_anim on
windowrule = match:namespace caelestia-area-picker, no_shadow on
