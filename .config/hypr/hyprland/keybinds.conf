bindr = Super, Super_L, exec, dms ipc call spotlight toggle
bind = Super, catchall, exec, dms ipc call spotlight close
bind = Super, mouse:272, exec, dms ipc call spotlight close
bind = Super, mouse:273, exec, dms ipc call spotlight close
bind = Super, mouse:274, exec, dms ipc call spotlight close
bind = Super, mouse:275, exec, dms ipc call spotlight close
bind = Super, mouse:276, exec, dms ipc call spotlight close
bind = Super, mouse:277, exec, dms ipc call spotlight close
bind = Super, mouse_up, exec, dms ipc call spotlight close
bind = Super, mouse_down, exec, dms ipc call spotlight close

# Brightness
# bindl = , XF86MonBrightnessUp, global, caelestia:brightnessUp
# bindl = , XF86MonBrightnessDown, global, caelestia:brightnessDown

# Audio Controls
bindel = , XF86AudioRaiseVolume, exec, dms ipc call audio increment 3
bindel = , XF86AudioLowerVolume, exec, dms ipc call audio decrement 3
bindl = , XF86AudioMute, exec, dms ipc call audio mute

# Brightness Controls
bindel = , XF86MonBrightnessUp, exec, dms ipc call brightness increment 5
bindel = , XF86MonBrightnessDown, exec, dms ipc call brightness decrement 5

# Media
bindl = Ctrl+Super, Space, exec, dms ipc call mpris playPause
bindl = , XF86AudioPlay, exec, dms ipc call mpris playPause
bindl = , XF86AudioPause, exec, dms ipc call mpris playPause
bindl = Ctrl+Super, Equal, exec, dms ipc call mpris next 
bindl = , XF86AudioNext, exec, dms ipc call mpris next
bindl = Ctrl+Super, Minus, exec, dms ipc call mpris previous
bindl = , XF86AudioPrev, exec, dms ipc call mpris previous
bindl = , XF86AudioStop, exec, dms ipc call mpris stop

