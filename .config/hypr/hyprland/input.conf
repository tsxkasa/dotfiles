input {
  kb_layout = us
  numlock_by_default = true
  repeat_delay = 250
  repeat_rate = 35

  follow_mouse = 1
  off_window_axis_events = 2

  accel_profile = flat
  sensitivity = 1.3

  touchpad {
    natural_scroll = yes
    disable_while_typing = true
    clickfinger_behavior = true
    scroll_factor = 0.5
  } 
} 

binds {
  scroll_event_delay = 0
  hide_special_on_workspace_change = true
} 

cursor {
  zoom_factor = 1
  zoom_rigid = false
  hotspot_padding = 1
  no_hardware_cursors = 1
} 
