# ~/.config/yazi/yazi.toml
[mgr]
linemode = "size_and_mtime"

[plugin]
prepend_preloaders = [
  # Replace magick, image, video with mediainfo
  { mime = "{video,image}/*", run = "mediainfo" },
  { mime = "application/subrip", run = "mediainfo" },
  # Adobe Illustrator, Adobe Photoshop is image/adobe.photoshop, already handled above
  { mime = "application/postscript", run = "mediainfo" },
  # Fonts
  { mime = "font/*", run = "font-sample" },
  { mime = "application/ms-opentype", run = "font-sample" },
  { name = "*.{otf,ttf,woff,woff2}", run = "font-sample" },
  # 3d objects
  { url = "*.{3mf,obj,pts,ply,stl,step,stp}", run="f3d-preview"},
]
prepend_previewers = [
  # Replace magick, image, video with mediainfo
  { mime = "{video,image}/*", run = "mediainfo" },
  { mime = "application/subrip", run = "mediainfo" },
  # Adobe Illustrator, Adobe Photoshop is image/adobe.photoshop, already handled above
  { mime = "application/postscript", run = "mediainfo" },
  # Fonts
  { mime = "font/*", run = "font-sample" },
  { mime = "application/ms-opentype", run = "font-sample" },
  { name = "*.{otf,ttf,woff,woff2}", run = "font-sample" },
  # 3d objects
  { url = "*.{3mf,obj,pts,ply,stl,step,stp}", run="f3d-preview"},
  # Binaries
  { name = "*.{bin,exe,dll}", run = "hevi" },
  # Audio metadata
  { mime = "audio/*", run = "exifaudio" },
  # Markdown
  { name = "*.md", run = "mdcat" },
]
# There are more extensions which are supported by mediainfo.
# Just add file's MIME type to `previewers`, `preloaders` above.
# https://mediaarea.net/en/MediaInfo/Support/Formats

# For a large file like Adobe Illustrator, Adobe Photoshop, etc
# you may need to increase the memory limit if no image is rendered.
# https://yazi-rs.github.io/docs/configuration/yazi#tasks
[tasks]
image_alloc = 1073741824  # = 1024*1024*1024 = 1024MB

[spot]
# Section header style.
# Example: Video, Text, Image,... with green color in preview images above
title = { fg = "green" }
# Value style.
# Example: `Format: FLAC` with blue color in preview images above
tbl_col = { fg = "blue" }

[opener]
edit = [
  { run = 'nvim "$@"', block = true },
]
open = [{ run = 'xdg-open "$@"', desc = "Open", for = "unix" }]
extract = [
  { run = 'ya pub extract --list "$@"', desc = "Extract here", for = "unix" },
  { run = "ya pub extract --list %*", desc = "Extract here", for = "windows" },
]
play = [
  { run = 'mpv "$@"', orphan = true, for = "unix" },
]
